<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;900&family=Work+Sans:ital,wght@0,300;0,400;0,700;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; background: #0A0A0C; position: relative; font-family: 'Work Sans', sans-serif; }

  .photo { position: absolute; inset: 0; background: url('./public/images/curfew-stage-neon-wide.jpg') center center / cover; filter: saturate(1.2) brightness(0.8) contrast(1.15); }
  .wash { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(10,10,12,0.7) 0%, rgba(200,164,90,0.15) 30%, rgba(10,10,12,0.5) 55%, rgba(10,10,12,0.96) 100%); }
  .glow { position: absolute; top: -100px; left: 50%; transform: translateX(-50%); width: 700px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(200,164,90,0.2) 0%, transparent 60%); filter: blur(50px); mix-blend-mode: screen; }
  .grain { position: absolute; inset: 0; opacity: 0.06; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); mix-blend-mode: overlay; z-index: 50; }
  .razor { position: absolute; left: 0; right: 0; top: 400px; height: 1px; background: rgba(200,164,90,0.25); z-index: 15; }

  .top-info { position: absolute; top: 50px; left: 55px; right: 55px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 10; }
  .tagline { font-family: 'Work Sans'; font-weight: 400; font-style: italic; font-size: 24px; letter-spacing: 0.12em; text-transform: uppercase; color: #C8A45A; }
  .date-main { font-family: 'Big Shoulders Display'; font-weight: 900; font-size: 72px; line-height: 1; color: #C8A45A; }

  .center-info { position: absolute; top: 50%; left: 55px; transform: translateY(-50%); z-index: 10; }
  .venue-big { font-family: 'Work Sans'; font-weight: 700; font-size: 22px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(200,164,90,0.7); }
  .date-sub { font-family: 'Work Sans'; font-weight: 700; font-size: 18px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(242,237,227,0.5); margin-top: 8px; }

  .title-block { position: absolute; bottom: 45px; left: 55px; right: 55px; z-index: 10; }
  .t-curfew { font-family: 'Big Shoulders Display'; font-weight: 900; font-size: 195px; line-height: 0.88; text-transform: uppercase; color: #F2EDE3; text-shadow: 0 4px 60px rgba(200,164,90,0.3); }
  .t-festival { font-family: 'Big Shoulders Display'; font-weight: 900; font-size: 195px; line-height: 0.88; text-transform: uppercase; color: #C8A45A; }
  .t-year { font-family: 'Big Shoulders Display'; font-weight: 700; font-size: 115px; line-height: 1; color: transparent; -webkit-text-stroke: 2px rgba(200,164,90,0.5); letter-spacing: 0.08em; margin-top: 5px; }
</style>
</head>
<body>
  <div class="photo"></div><div class="wash"></div><div class="glow"></div><div class="razor"></div>
  <div class="top-info">
    <span class="tagline">In House We Trust</span>
    <div class="date-main">06.06</div>
  </div>
  <div class="center-info">
    <div class="venue-big">Blaarmeersen · Gent · Belgium</div>
    <div class="date-sub">Saturday 6 June 2026</div>
  </div>
  <div class="title-block">
    <div class="t-curfew">CURFEW</div><div class="t-festival">FESTIVAL</div><div class="t-year">2026</div>
  </div>
  <div class="grain"></div>
</body>
</html>
