<svg viewBox="0 0 1200 628" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@100;900&family=Space+Mono:wght@400&display=swap');
    </style>
    <filter id="blur-60">
      <feGaussianBlur stdDeviation="60" />
    </filter>
    <filter id="blur-50">
      <feGaussianBlur stdDeviation="50" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="#0A0A0C" />

  <!-- Thermal Orbs -->
  <!-- Signal orb (top-left, 450px diameter) -->
  <circle cx="150" cy="80" r="225" fill="#3DED97" opacity="0.14" filter="url(#blur-60)" />

  <!-- Gold orb (bottom-right, 300px diameter) -->
  <circle cx="1100" cy="550" r="150" fill="#C8A45A" opacity="0.08" filter="url(#blur-50)" />

  <!-- Horizontal razor line -->
  <line x1="100" y1="314" x2="900" y2="314" stroke="#F2EDE3" stroke-width="1" opacity="0.04" />

  <!-- Main Title: CURFEW (left, massive, bottom-aligned, ~380px) -->
  <text x="100" y="540" font-family="Big Shoulders Display" font-size="380" font-weight="900" fill="#F2EDE3" letter-spacing="-23" dominant-baseline="middle">
    CURFEW
  </text>

  <!-- 2026 in thin green (to the right) -->
  <text x="1100" y="240" font-family="Big Shoulders Display" font-size="110" font-weight="100" fill="#3DED97" text-anchor="end" letter-spacing="10" dominant-baseline="middle">
    2026
  </text>

  <!-- Event details (bottom-left, tiny, muted) -->
  <text x="100" y="605" font-family="Space Mono" font-size="11" font-weight="400" fill="#F2EDE3" opacity="0.3">
    SAT 6 JUNE · BLAARMEERSEN · GENT
  </text>
</svg>
