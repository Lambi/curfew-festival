<svg viewBox="0 0 1200 628" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@900&family=Space+Mono:wght@400&display=swap');

      .headline {
        font-family: 'Big Shoulders Display', sans-serif;
        font-weight: 900;
        font-size: 420px;
        letter-spacing: -12px;
        text-transform: uppercase;
        fill: #FAF2E1;
        line-height: 0.8;
      }

      .accent {
        fill: #3DED97;
      }

      .small-text {
        font-family: 'Space Mono', monospace;
        font-weight: 400;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 2px;
        fill: #FAF2E1;
      }
    </style>

    <filter id="bloom-gold">
      <feGaussianBlur in="SourceGraphic" stdDeviation="50" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="#0F0E17" />

  <!-- Single golden bloom, centered and soft -->
  <circle cx="600" cy="314" r="280" fill="#C8A45A" opacity="0.08" filter="url(#bloom-gold)" />

  <!-- Main headline left-aligned, filling height -->
  <text x="80" y="480" class="headline">CURFEW</text>

  <!-- Accent year to the right -->
  <text x="1050" y="250" text-anchor="end" class="accent" style="font-size: 140px; letter-spacing: -4px;">2026</text>

  <!-- Bottom info left-aligned -->
  <text x="80" y="600" class="small-text">SAT 6 JUNE · BLAARMEERSEN · GENT</text>
</svg>
