<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;900&family=Work+Sans:ital,wght@0,300;0,400;0,700;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 820px; height: 312px; overflow: hidden; background: #0A0A0C; position: relative; font-family: 'Work Sans', sans-serif; }

  .photo-base {
    position: absolute; inset: 0;
    background: url('./Curfew banner.jpg') center 42% / cover;
    filter: saturate(1.5) brightness(1.05) contrast(1.25) hue-rotate(-5deg);
  }
  .sun-wash {
    position: absolute; inset: 0;
    background: linear-gradient(170deg,
      rgba(255,140,60,0.42) 0%, rgba(240,100,50,0.35) 30%,
      rgba(200,70,60,0.25) 60%, rgba(180,60,70,0.30) 100%);
    mix-blend-mode: color;
  }
  .sun-burst {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 60% 30%,
      rgba(255,200,100,0.45) 0%, rgba(255,160,70,0.22) 25%,
      transparent 50%);
    mix-blend-mode: screen;
  }
  .amber-tint {
    position: absolute; inset: 0;
    background: rgba(200,100,40,0.10);
    mix-blend-mode: multiply;
  }
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 45%,
      transparent 30%, rgba(10,10,12,0.20) 60%, rgba(10,10,12,0.55) 100%);
  }
  .bottom-fade {
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      transparent 35%, rgba(10,10,12,0.30) 65%, rgba(10,10,12,0.70) 100%);
  }
  .top-fade {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(10,10,12,0.20) 0%, transparent 18%);
  }
  .grain {
    position: absolute; inset: 0; opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    mix-blend-mode: overlay; z-index: 50;
  }

  /* ── TEXT — compact layout ── */
  .center-block {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center; z-index: 10; width: 760px;
  }
  .title-row {
    display: flex; justify-content: center; align-items: baseline; gap: 16px;
  }
  .t-curfew {
    font-family: 'Big Shoulders Display'; font-weight: 900;
    font-size: 105px; line-height: 0.88; text-transform: uppercase;
    color: #FFFFFF; letter-spacing: 0.04em;
    text-shadow: 0 4px 40px rgba(0,0,0,0.45), 0 2px 10px rgba(0,0,0,0.35);
  }
  .t-festival {
    font-family: 'Big Shoulders Display'; font-weight: 900;
    font-size: 105px; line-height: 0.88; text-transform: uppercase;
    color: #FFB454; letter-spacing: 0.04em;
    text-shadow: 0 4px 35px rgba(0,0,0,0.40), 0 2px 8px rgba(0,0,0,0.30);
  }
  .info-line {
    font-family: 'Work Sans'; font-weight: 700;
    font-size: 15px; letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(255,255,255,0.88);
    margin-top: 12px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.40);
  }
  .info-line .date {
    color: #FFFFFF;
    font-family: 'Big Shoulders Display'; font-weight: 900;
    font-size: 22px; letter-spacing: 0.05em;
  }
  .info-line .sep {
    color: rgba(255,200,140,0.50);
    margin: 0 8px;
  }
  .info-line .venue-sub {
    color: rgba(255,200,130,0.75);
    font-weight: 400;
  }
  .cta-line {
    font-family: 'Work Sans'; font-weight: 700;
    font-size: 16px; letter-spacing: 0.12em;
    color: #FFFFFF; margin-top: 10px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.40);
  }
</style>
</head>
<body>
  <div class="photo-base"></div>
  <div class="sun-wash"></div>
  <div class="sun-burst"></div>
  <div class="amber-tint"></div>
  <div class="vignette"></div>
  <div class="bottom-fade"></div>
  <div class="top-fade"></div>
  <div class="grain"></div>

  <div class="center-block">
    <div class="title-row">
      <span class="t-curfew">CURFEW</span>
      <span class="t-festival">FESTIVAL</span>
    </div>
    <div class="info-line">
      <span class="date">SAT 06.06</span>
      <span class="sep">|</span>
      <span>Sport Vlaanderen Ghent</span>
      <span class="venue-sub"> (Blaarmeersen)</span>
    </div>
    <div class="cta-line">WWW.CURFEW.EVENTS</div>
  </div>
</body>
</html>
