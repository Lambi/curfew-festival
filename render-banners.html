<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Curfew Banner Renderer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; padding: 40px; }
  h1 { color: #E8CC70; font-size: 28px; }
  p { font-size: 16px; line-height: 1.6; color: #ccc; max-width: 600px; }
  .status { margin: 8px 0; padding: 12px 16px; background: #16213e; border-radius: 8px; font-size: 14px; }
  .done { color: #4ade80; }
  .working { color: #fbbf24; }
  .error { color: #f87171; }
  button { background: #E8CC70; color: #0A0A0C; border: none; padding: 16px 40px; font-size: 18px; font-weight: 700; border-radius: 8px; cursor: pointer; margin-top: 24px; }
  button:hover { background: #d4b85c; }
  .instructions { background: #16213e; padding: 20px; border-radius: 8px; margin: 20px 0; border-left: 3px solid #E8CC70; }
  .instructions code { color: #E8CC70; background: rgba(232,204,112,0.1); padding: 2px 6px; border-radius: 3px; }
</style>
</head>
<body>
<h1>CURFEW FESTIVAL — Banner PNG Renderer</h1>

<div class="instructions">
  <p><strong>How it works:</strong> Click a button below. Pick your <code>curfew-festival</code> folder when prompted. All banners render and save directly as PNGs.</p>
</div>

<button onclick="renderSet('variants')">RENDER ALL 4 SUNSET BANNERS</button>

<div id="log"></div>

<script>
const VARIANTS = [
  { file: 'banner-sunset.html', name: 'curfew-fb-event-banner.png', w: 1920, h: 1005 },
  { file: 'banner-ig-post-sunset.html', name: 'curfew-ig-post.png', w: 1080, h: 1350 },
  { file: 'banner-ig-story-sunset.html', name: 'curfew-ig-story.png', w: 1080, h: 1920 },
  { file: 'banner-fb-profile-sunset.html', name: 'curfew-fb-profile-banner.png', w: 820, h: 312 },
];

const ALL4 = [
  { file: 'banner-fb-final.html', name: 'curfew-fb-event-banner.png', w: 1920, h: 1005 },
  { file: 'banner-ig-post-final.html', name: 'curfew-ig-post.png', w: 1080, h: 1350 },
  { file: 'banner-ig-story-final.html', name: 'curfew-ig-story.png', w: 1080, h: 1920 },
  { file: 'banner-fb-profile-final.html', name: 'curfew-fb-profile-banner.png', w: 820, h: 312 },
];

function log(msg, cls) {
  const d = document.createElement('div');
  d.className = 'status ' + (cls || '');
  d.innerHTML = msg;
  document.getElementById('log').appendChild(d);
}

async function renderBanner(banner, dirHandle) {
  return new Promise((resolve, reject) => {
    log(`Loading <strong>${banner.file}</strong>...`, 'working');
    const iframe = document.createElement('iframe');
    iframe.style.width = banner.w + 'px';
    iframe.style.height = banner.h + 'px';
    iframe.style.position = 'absolute';
    iframe.style.left = '-9999px';
    iframe.style.top = '0';
    iframe.style.border = 'none';
    iframe.style.display = 'block';
    document.body.appendChild(iframe);

    iframe.onload = async () => {
      log(`Waiting for fonts & images...`, 'working');
      await new Promise(r => setTimeout(r, 3500));

      try {
        const body = iframe.contentDocument.body;
        const canvas = await html2canvas(body, {
          width: banner.w,
          height: banner.h,
          scale: 1,
          useCORS: true,
          allowTaint: true,
          backgroundColor: '#0A0A0C',
          foreignObjectRendering: false
        });

        if (dirHandle) {
          const fileHandle = await dirHandle.getFileHandle(banner.name, { create: true });
          const writable = await fileHandle.createWritable();
          const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
          await writable.write(blob);
          await writable.close();
          log(`<strong>${banner.name}</strong> (${banner.w}×${banner.h}) — saved!`, 'done');
        } else {
          const link = document.createElement('a');
          link.download = banner.name;
          link.href = canvas.toDataURL('image/png');
          link.click();
          log(`<strong>${banner.name}</strong> (${banner.w}×${banner.h}) — downloaded!`, 'done');
        }

        document.body.removeChild(iframe);
        resolve();
      } catch(e) {
        log(`Error: ${banner.file} — ${e.message}`, 'error');
        document.body.removeChild(iframe);
        reject(e);
      }
    };

    iframe.src = './' + banner.file;
  });
}

async function renderSet(which) {
  document.getElementById('log').innerHTML = '';
  const banners = which === 'variants' ? VARIANTS : ALL4;
  let dirHandle = null;

  if (window.showDirectoryPicker) {
    try {
      dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
      log(`Saving to: <strong>${dirHandle.name}</strong>`, 'done');
    } catch(e) {
      if (e.name === 'AbortError') { log('Cancelled folder pick — downloading instead.', 'working'); }
    }
  }

  log(`<strong>Rendering ${banners.length} banners...</strong>`, 'working');

  for (const banner of banners) {
    try {
      await renderBanner(banner, dirHandle);
      await new Promise(r => setTimeout(r, 1000));
    } catch(e) {
      log(`Failed: ${banner.file}`, 'error');
    }
  }

  log(`<br><strong style="font-size:18px;color:#4ade80;">Done! ${banners.length} PNGs ready.</strong>`, 'done');
}
</script>
</body>
</html>
