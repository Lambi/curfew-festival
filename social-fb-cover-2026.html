<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Curfew Festival 2026 — FB Cover</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;900&family=Work+Sans:ital,wght@0,300;0,400;0,700;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 628px;
    overflow: hidden;
    background: #0A0A0C;
    position: relative;
    font-family: 'Work Sans', sans-serif;
  }

  .photo-bg {
    position: absolute;
    inset: 0;
    background: url('./public/images/curfew-stage-neon-wide.jpg') center center / cover no-repeat;
    filter: saturate(1.15) brightness(0.75) contrast(1.1) hue-rotate(-10deg);
  }

  .golden-wash {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      90deg,
      rgba(10, 10, 12, 0.92) 0%,
      rgba(10, 10, 12, 0.6) 35%,
      rgba(200, 164, 90, 0.12) 60%,
      rgba(10, 10, 12, 0.55) 100%
    );
  }

  .warm-glow {
    position: absolute;
    top: -150px; right: 200px;
    width: 600px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200, 164, 90, 0.2) 0%, transparent 60%);
    filter: blur(60px);
    mix-blend-mode: screen;
  }

  .grain {
    position: absolute;
    inset: 0;
    opacity: 0.05;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    mix-blend-mode: overlay;
    pointer-events: none;
    z-index: 50;
  }

  .razor {
    position: absolute;
    left: 0; right: 0;
    top: 310px;
    height: 1px;
    background: rgba(200, 164, 90, 0.2);
    z-index: 15;
  }

  /* ── LEFT TITLE STACK ── */
  .title-block {
    position: absolute;
    bottom: 40px;
    left: 50px;
    z-index: 10;
  }

  .title-curfew {
    font-family: 'Big Shoulders Display', sans-serif;
    font-weight: 900;
    font-size: 155px;
    line-height: 0.88;
    text-transform: uppercase;
    color: #F2EDE3;
    letter-spacing: 0.04em;
    text-shadow: 0 4px 60px rgba(200, 164, 90, 0.25);
  }

  .title-festival {
    font-family: 'Big Shoulders Display', sans-serif;
    font-weight: 900;
    font-size: 155px;
    line-height: 0.88;
    text-transform: uppercase;
    color: #C8A45A;
    letter-spacing: 0.04em;
  }

  .title-year {
    font-family: 'Big Shoulders Display', sans-serif;
    font-weight: 700;
    font-size: 80px;
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 2px rgba(200, 164, 90, 0.5);
    letter-spacing: 0.1em;
    margin-top: 4px;
  }

  /* ── RIGHT INFO — big golden ── */
  .info-cluster {
    position: absolute;
    top: 50px;
    right: 50px;
    text-align: right;
    z-index: 10;
  }

  .info-tagline {
    font-family: 'Work Sans', sans-serif;
    font-weight: 400;
    font-style: italic;
    font-size: 20px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #C8A45A;
  }

  .info-date {
    font-family: 'Big Shoulders Display', sans-serif;
    font-weight: 900;
    font-size: 60px;
    color: #C8A45A;
    letter-spacing: 0.04em;
    margin-top: 8px;
  }

  .info-venue {
    font-family: 'Work Sans', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(242, 237, 227, 0.55);
    margin-top: 8px;
  }

  .coord {
    position: absolute;
    bottom: 50px;
    right: 50px;
    font-family: 'Work Sans', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: rgba(200, 164, 90, 0.25);
    z-index: 10;
  }
</style>
</head>
<body>
  <div class="photo-bg"></div>
  <div class="golden-wash"></div>
  <div class="warm-glow"></div>
  <div class="razor"></div>

  <div class="info-cluster">
    <div class="info-tagline">In House We Trust</div>
    <div class="info-date">SAT 06.06</div>
    <div class="info-venue">Blaarmeersen · Gent · Belgium</div>
  </div>

  <div class="title-block">
    <div class="title-curfew">CURFEW</div>
    <div class="title-festival">FESTIVAL</div>
    <div class="title-year">2026</div>
  </div>

  <span class="coord">51.0543°N 3.6856°E</span>
  <div class="grain"></div>
</body>
</html>
