<svg viewBox="0 0 1920 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@900&family=Space+Mono:wght@400&display=swap');

      .headline {
        font-family: 'Big Shoulders Display', sans-serif;
        font-weight: 900;
        font-size: 520px;
        letter-spacing: -14px;
        text-transform: uppercase;
        fill: #FAF2E1;
        line-height: 0.8;
      }

      .accent {
        fill: #3DED97;
      }

      .small-text {
        font-family: 'Space Mono', monospace;
        font-weight: 400;
        font-size: 16px;
        text-transform: uppercase;
        letter-spacing: 2px;
        fill: #FAF2E1;
      }
    </style>

    <filter id="bloom-soft">
      <feGaussianBlur in="SourceGraphic" stdDeviation="55" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="600" fill="#0F0E17" />

  <!-- Bloom circles at edges -->
  <circle cx="150" cy="150" r="240" fill="#FF6B9D" opacity="0.09" filter="url(#bloom-soft)" />
  <circle cx="1770" cy="480" r="260" fill="#3DED97" opacity="0.09" filter="url(#bloom-soft)" />

  <!-- Main headline spanning width -->
  <text x="960" y="380" text-anchor="middle" class="headline">CURFEW</text>

  <!-- Accent year -->
  <text x="960" y="520" text-anchor="middle" class="accent" style="font-size: 140px; letter-spacing: -3px;">2026</text>

  <!-- Bottom info centered -->
  <text x="960" y="575" text-anchor="middle" class="small-text">SAT 6 JUNE · BLAARMEERSEN · GENT</text>
</svg>
