<svg viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@100;900&family=Space+Mono:wght@400&display=swap');
    </style>
    <filter id="blur-70">
      <feGaussianBlur stdDeviation="70" />
    </filter>
    <filter id="blur-60">
      <feGaussianBlur stdDeviation="60" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="#0A0A0C" />

  <!-- Thermal Orbs -->
  <!-- Rose orb (top half, 600px diameter) -->
  <circle cx="200" cy="280" r="300" fill="#FF6B9D" opacity="0.16" filter="url(#blur-70)" />

  <!-- Gold orb (middle-left, 350px diameter) -->
  <circle cx="150" cy="960" r="175" fill="#C8A45A" opacity="0.10" filter="url(#blur-60)" />

  <!-- Horizontal razor line (mid-canvas, 40% width) -->
  <line x1="216" y1="960" x2="864" y2="960" stroke="#F2EDE3" stroke-width="1" opacity="0.04" />

  <!-- Top label: IN HOUSE WE TRUST -->
  <text x="540" y="120" font-family="Space Mono" font-size="16" font-weight="400" fill="#F2EDE3" text-anchor="middle" letter-spacing="3" opacity="0.5">
    IN HOUSE WE TRUST
  </text>

  <!-- 2026 in thin weight, signal green (above title block) -->
  <text x="540" y="950" font-family="Big Shoulders Display" font-size="90" font-weight="100" fill="#3DED97" text-anchor="middle" letter-spacing="10" dominant-baseline="middle">
    2026
  </text>

  <!-- Main Title: CURFEW (lower third, ~320px) -->
  <text x="540" y="1280" font-family="Big Shoulders Display" font-size="320" font-weight="900" fill="#F2EDE3" text-anchor="middle" letter-spacing="-19" dominant-baseline="middle">
    CURFEW
  </text>

  <!-- Subtitle: FESTIVAL (~200px) -->
  <text x="540" y="1580" font-family="Big Shoulders Display" font-size="200" font-weight="900" fill="#F2EDE3" text-anchor="middle" letter-spacing="-12" dominant-baseline="middle">
    FESTIVAL
  </text>

  <!-- Coordinate whisper -->
  <text x="80" y="500" font-family="Space Mono" font-size="13" font-weight="400" fill="#F2EDE3" opacity="0.12">
    [-12.35, 19.68]
  </text>

  <!-- Event details (bottom) -->
  <text x="540" y="1880" font-family="Space Mono" font-size="12" font-weight="400" fill="#F2EDE3" opacity="0.3" text-anchor="middle">
    SAT 6 JUNE · GENT · €25
  </text>
</svg>
