<svg viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@900&family=Space+Mono:wght@400&display=swap');

      .headline {
        font-family: 'Big Shoulders Display', sans-serif;
        font-weight: 900;
        font-size: 340px;
        letter-spacing: -10px;
        text-transform: uppercase;
        fill: #FAF2E1;
        line-height: 0.85;
      }

      .subheadline {
        font-family: 'Big Shoulders Display', sans-serif;
        font-weight: 900;
        font-size: 180px;
        letter-spacing: -5px;
        text-transform: uppercase;
        fill: #FAF2E1;
        line-height: 0.9;
      }

      .accent {
        fill: #3DED97;
      }

      .small-text {
        font-family: 'Space Mono', monospace;
        font-weight: 400;
        font-size: 18px;
        text-transform: uppercase;
        letter-spacing: 2px;
        fill: #FAF2E1;
      }

      .top-text {
        font-family: 'Space Mono', monospace;
        font-weight: 400;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
        fill: #FAF2E1;
        opacity: 0.7;
      }
    </style>

    <filter id="bloom-soft">
      <feGaussianBlur in="SourceGraphic" stdDeviation="50" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="#0F0E17" />

  <!-- Bloom circles -->
  <circle cx="200" cy="300" r="220" fill="#FF6B9D" opacity="0.1" filter="url(#bloom-soft)" />
  <circle cx="850" cy="1650" r="240" fill="#3DED97" opacity="0.1" filter="url(#bloom-soft)" />

  <!-- Top text -->
  <text x="540" y="100" text-anchor="middle" class="top-text">IN HOUSE WE TRUST</text>

  <!-- Accent year -->
  <text x="540" y="750" text-anchor="middle" class="accent" style="font-size: 110px; letter-spacing: -2px;">2026</text>

  <!-- Main headline stacked -->
  <text x="540" y="950" text-anchor="middle" class="headline">CURFEW</text>
  <text x="540" y="1320" text-anchor="middle" class="subheadline">FESTIVAL</text>

  <!-- Bottom info -->
  <text x="540" y="1880" text-anchor="middle" class="small-text">SAT 6 JUNE · GENT · €25</text>
</svg>
