<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;900&family=Work+Sans:ital,wght@0,300;0,400;0,700;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1920px; overflow: hidden; background: #0A0A0C; position: relative; font-family: 'Work Sans', sans-serif; }

  .photo-base {
    position: absolute; inset: 0;
    background: url('./Curfew banner.jpg') center 30% / cover;
    filter: saturate(1.5) brightness(1.05) contrast(1.25) hue-rotate(-5deg);
  }
  .sun-wash {
    position: absolute; inset: 0;
    background: linear-gradient(175deg,
      rgba(255,140,60,0.42) 0%, rgba(240,100,50,0.35) 30%,
      rgba(200,70,60,0.25) 60%, rgba(180,60,70,0.30) 100%);
    mix-blend-mode: color;
  }
  .sun-burst {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 55% 28%,
      rgba(255,200,100,0.48) 0%, rgba(255,160,70,0.24) 22%,
      rgba(240,120,50,0.10) 40%, transparent 56%);
    mix-blend-mode: screen;
  }
  .warm-glow {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 8%,
      rgba(255,140,100,0.16) 0%, transparent 48%);
    mix-blend-mode: screen;
  }
  .amber-tint {
    position: absolute; inset: 0;
    background: rgba(200,100,40,0.10);
    mix-blend-mode: multiply;
  }
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 38%,
      transparent 25%, rgba(10,10,12,0.20) 55%, rgba(10,10,12,0.60) 100%);
  }
  .bottom-fade {
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      transparent 45%, rgba(10,10,12,0.20) 60%,
      rgba(10,10,12,0.55) 78%, rgba(10,10,12,0.80) 100%);
  }
  .top-fade {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(10,10,12,0.28) 0%, transparent 12%);
  }
  .orb1 {
    position: absolute; width: 700px; height: 500px; top: -60px; right: 0%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,160,60,0.13) 0%, transparent 60%);
    filter: blur(90px); mix-blend-mode: screen;
  }
  .orb2 {
    position: absolute; width: 500px; height: 400px; bottom: 100px; left: 0%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(220,80,50,0.08) 0%, transparent 70%);
    filter: blur(70px); mix-blend-mode: screen;
  }
  .grain {
    position: absolute; inset: 0; opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    mix-blend-mode: overlay; z-index: 50;
  }
  .razor-top { position: absolute; left: 70px; right: 70px; top: 120px; height: 1px; background: rgba(255,200,140,0.14); z-index: 15; }
  .razor-bot { position: absolute; left: 70px; right: 70px; bottom: 120px; height: 1px; background: rgba(255,200,140,0.14); z-index: 15; }

  /* ── TEXT ── */
  .center-block {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -46%);
    text-align: center; z-index: 10; width: 960px;
  }
  .t-curfew {
    font-family: 'Big Shoulders Display'; font-weight: 900;
    font-size: 175px; line-height: 0.84; text-transform: uppercase;
    color: #FFFFFF; letter-spacing: 0.04em;
    text-shadow: 0 5px 55px rgba(0,0,0,0.45), 0 2px 14px rgba(0,0,0,0.35);
  }
  .t-festival {
    font-family: 'Big Shoulders Display'; font-weight: 900;
    font-size: 175px; line-height: 0.84; text-transform: uppercase;
    color: #FFB454; letter-spacing: 0.04em;
    text-shadow: 0 5px 48px rgba(0,0,0,0.40), 0 2px 12px rgba(0,0,0,0.30);
  }
  .tagline {
    font-family: 'Work Sans'; font-weight: 400; font-style: italic;
    font-size: 24px; letter-spacing: 0.25em; text-transform: uppercase;
    color: rgba(255,230,190,0.90); margin-top: 22px;
    text-shadow: 0 2px 16px rgba(0,0,0,0.40);
  }
  .divider {
    width: 140px; height: 1px;
    background: rgba(255,200,140,0.42);
    margin: 24px auto 22px;
  }
  .info-date {
    font-family: 'Big Shoulders Display'; font-weight: 900;
    font-size: 72px; color: #FFFFFF; letter-spacing: 0.05em; line-height: 1;
    text-shadow: 0 4px 20px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.30);
  }
  .info-venue-name {
    font-family: 'Work Sans'; font-weight: 700;
    font-size: 20px; letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(255,245,235,0.88); margin-top: 16px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.35);
  }
  .info-venue-sub {
    font-family: 'Work Sans'; font-weight: 400;
    font-size: 14px; letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(255,200,130,0.75); margin-top: 2px;
    text-shadow: 0 1px 8px rgba(0,0,0,0.30);
  }
  .cta {
    margin-top: 28px;
    text-shadow: 0 3px 16px rgba(0,0,0,0.40);
  }
  .cta .label {
    font-family: 'Work Sans'; font-weight: 400;
    color: rgba(255,240,220,0.65); font-size: 15px; letter-spacing: 0.20em; text-transform: uppercase;
  }
  .cta .url {
    font-family: 'Work Sans'; font-weight: 700;
    color: #FFFFFF; font-size: 24px; letter-spacing: 0.12em;
  }
</style>
</head>
<body>
  <div class="photo-base"></div>
  <div class="sun-wash"></div>
  <div class="sun-burst"></div>
  <div class="warm-glow"></div>
  <div class="amber-tint"></div>
  <div class="vignette"></div>
  <div class="bottom-fade"></div>
  <div class="top-fade"></div>
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="grain"></div>
  <div class="razor-top"></div>
  <div class="razor-bot"></div>

  <div class="center-block">
    <div class="t-curfew">CURFEW</div>
    <div class="t-festival">FESTIVAL</div>
    <div class="tagline">In House We Trust</div>
    <div class="divider"></div>
    <div class="info-date">SAT 06.06</div>
    <div class="info-venue-name">Sport Vlaanderen Ghent</div>
    <div class="info-venue-sub">(Blaarmeersen)</div>
    <div class="cta">
      <span class="label">Info & Tickets</span><br>
      <span class="url">WWW.CURFEW.EVENTS</span>
    </div>
  </div>
</body>
</html>
