<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;900&family=Work+Sans:ital,wght@0,300;0,400;0,700;1,400&family=Space+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1005px; overflow: hidden; background: #0A0A0C; position: relative; font-family: 'Work Sans', sans-serif; }

  .photo-base {
    position: absolute; inset: 0;
    background: url('./Curfew banner.jpg') center 40% / cover;
    filter: saturate(1.6) brightness(1.15) contrast(1.2) hue-rotate(15deg);
  }
  .sun-wash { position: absolute; inset: 0; background: linear-gradient(160deg, rgba(255,179,71,0.45) 0%, rgba(220,160,70,0.35) 30%, rgba(255,140,50,0.28) 60%, rgba(220,120,40,0.35) 100%); mix-blend-mode: color; }
  .sun-burst { position: absolute; inset: 0; background: radial-gradient(ellipse at 70% 10%, rgba(255,220,140,0.6) 0%, rgba(255,179,71,0.35) 25%, transparent 55%); mix-blend-mode: screen; }
  .warm-glow { position: absolute; inset: 0; background: radial-gradient(ellipse at 20% 60%, rgba(255,160,60,0.28) 0%, transparent 50%); mix-blend-mode: screen; }
  .amber-tint { position: absolute; inset: 0; background: rgba(220,150,60,0.12); mix-blend-mode: multiply; }
  .vignette { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 45%, transparent 35%, rgba(10,10,12,0.3) 72%, rgba(10,10,12,0.65) 100%); }
  .bottom-fade { position: absolute; inset: 0; background: linear-gradient(180deg, transparent 50%, rgba(10,10,12,0.35) 70%, rgba(10,10,12,0.75) 100%); }
  .top-fade { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(10,10,12,0.35) 0%, transparent 18%); }
  .orb1 { position: absolute; width: 700px; height: 700px; top: -200px; right: 15%; border-radius: 50%; background: radial-gradient(circle, rgba(255,200,100,0.2) 0%, transparent 60%); filter: blur(90px); mix-blend-mode: screen; }
  .orb2 { position: absolute; width: 500px; height: 500px; bottom: -100px; left: 20%; border-radius: 50%; background: radial-gradient(circle, rgba(255,160,60,0.15) 0%, transparent 70%); filter: blur(70px); mix-blend-mode: screen; }
  .grain { position: absolute; inset: 0; opacity: 0.04; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); mix-blend-mode: overlay; z-index: 50; }
  .razor-top { position: absolute; left: 300px; right: 300px; top: 120px; height: 1px; background: rgba(255,235,180,0.2); z-index: 15; }
  .razor-bot { position: absolute; left: 300px; right: 300px; bottom: 120px; height: 1px; background: rgba(255,235,180,0.2); z-index: 15; }

  /* ══════ TEXT — BIG & LIGHT ══════ */
  .center-block {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -52%);
    text-align: center; z-index: 10; width: 1600px;
  }
  .t-curfew {
    font-family: 'Big Shoulders Display'; font-weight: 900;
    font-size: 300px; line-height: 0.82; text-transform: uppercase;
    color: #FFFFFF;
    letter-spacing: 0.03em;
    text-shadow: 0 6px 80px rgba(0,0,0,0.5), 0 3px 20px rgba(0,0,0,0.4);
  }
  .t-festival {
    font-family: 'Big Shoulders Display'; font-weight: 900;
    font-size: 300px; line-height: 0.82; text-transform: uppercase;
    color: #E8CC70;
    letter-spacing: 0.03em;
    text-shadow: 0 6px 60px rgba(0,0,0,0.45), 0 3px 15px rgba(0,0,0,0.35);
  }
  .tagline {
    font-family: 'Work Sans'; font-weight: 400; font-style: italic;
    font-size: 36px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(255,240,200,0.95);
    margin-top: 18px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }
  .divider {
    width: 240px; height: 2px;
    background: rgba(255,235,180,0.55);
    margin: 20px auto 18px;
  }
  .info-row {
    display: flex; justify-content: center; align-items: center; gap: 50px;
  }
  .info-date {
    font-family: 'Big Shoulders Display'; font-weight: 900;
    font-size: 76px; color: #E8CC70;
    letter-spacing: 0.04em; line-height: 1;
    text-shadow: 0 3px 20px rgba(0,0,0,0.45);
  }
  .info-sep {
    width: 2px; height: 56px;
    background: rgba(255,235,180,0.4);
  }
  .info-venue { text-align: left; }
  .info-venue-name {
    font-family: 'Work Sans'; font-weight: 700;
    font-size: 30px; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(255,255,255,0.9);
    text-shadow: 0 2px 14px rgba(0,0,0,0.4);
  }
  .info-venue-city {
    font-family: 'Work Sans'; font-weight: 400;
    font-size: 22px; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(232,204,112,0.85);
    margin-top: 4px; text-shadow: 0 1px 10px rgba(0,0,0,0.3);
  }
  .cta {
    font-family: 'Work Sans'; font-weight: 700;
    font-size: 32px; letter-spacing: 0.2em; text-transform: uppercase;
    color: #FFFFFF;
    margin-top: 24px;
    text-shadow: 0 3px 20px rgba(0,0,0,0.5);
  }
  .cta .label {
    color: rgba(255,255,255,0.75);
    font-weight: 400; font-size: 22px; letter-spacing: 0.2em;
  }
  .cta .url {
    color: #FFFFFF; font-weight: 700; font-size: 32px;
  }

  .corner-tl { position: absolute; top: 36px; left: 55px; font-family: 'Space Mono'; font-size: 13px; letter-spacing: 0.14em; color: rgba(255,240,200,0.35); z-index: 10; }
  .corner-tr { position: absolute; top: 36px; right: 55px; font-family: 'Space Mono'; font-size: 13px; letter-spacing: 0.14em; color: rgba(255,240,200,0.35); z-index: 10; text-align: right; }
  .corner-bl { position: absolute; bottom: 36px; left: 55px; font-family: 'Work Sans'; font-weight: 400; font-size: 16px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,240,200,0.4); z-index: 10; text-shadow: 0 1px 8px rgba(0,0,0,0.3); }
  .corner-br { position: absolute; bottom: 36px; right: 55px; font-family: 'Work Sans'; font-weight: 400; font-size: 16px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.4); z-index: 10; text-shadow: 0 1px 8px rgba(0,0,0,0.3); }
</style>
</head>
<body>
  <div class="photo-base"></div>
  <div class="sun-wash"></div>
  <div class="sun-burst"></div>
  <div class="warm-glow"></div>
  <div class="amber-tint"></div>
  <div class="vignette"></div>
  <div class="bottom-fade"></div>
  <div class="top-fade"></div>
  <div class="orb1"></div><div class="orb2"></div>
  <div class="razor-top"></div><div class="razor-bot"></div>

  <div class="center-block">
    <div class="t-curfew">CURFEW</div>
    <div class="t-festival">FESTIVAL</div>
    <div class="tagline">In House We Trust</div>
    <div class="divider"></div>
    <div class="info-row">
      <div class="info-date">SAT 06.06</div>
      <div class="info-sep"></div>
      <div class="info-venue">
        <div class="info-venue-name">Blaarmeersen</div>
        <div class="info-venue-city">Gent · Belgium</div>
      </div>
    </div>
    <div class="cta">
      <span class="label">Info & Tickets</span>&ensp;&ensp;<span class="url">WWW.CURFEW.EVENTS</span>
    </div>
  </div>

  <div class="grain"></div>
</body>
</html>
