<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;900&family=Work+Sans:ital,wght@0,300;0,400;0,700;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1920px; overflow: hidden; background: #0A0A0C; position: relative; font-family: 'Work Sans', sans-serif; }

  .photo { position: absolute; inset: 0; background: url('./public/images/curfew-live-act-streamers.jpg') center center / cover; filter: saturate(1.25) brightness(0.8) contrast(1.15); }
  .wash { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(10,10,12,0.8) 0%, rgba(200,164,90,0.2) 12%, transparent 45%, rgba(10,10,12,0.4) 70%, rgba(10,10,12,0.97) 100%); }
  .flare { position: absolute; top: -200px; left: 50%; transform: translateX(-50%); width: 800px; height: 800px; border-radius: 50%; background: radial-gradient(circle, rgba(255,200,80,0.2) 0%, transparent 60%); filter: blur(40px); mix-blend-mode: screen; }
  .orb1 { position: absolute; width: 500px; height: 500px; top: 300px; left: -120px; border-radius: 50%; background: radial-gradient(circle, rgba(200,164,90,0.3) 0%, transparent 70%); filter: blur(70px); mix-blend-mode: screen; }
  .orb2 { position: absolute; width: 350px; height: 350px; top: 900px; right: -80px; border-radius: 50%; background: radial-gradient(circle, rgba(255,179,71,0.2) 0%, transparent 70%); filter: blur(70px); mix-blend-mode: screen; }
  .grain { position: absolute; inset: 0; opacity: 0.05; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); mix-blend-mode: overlay; z-index: 50; }
  .razor1 { position: absolute; left: 0; right: 0; top: 700px; height: 1px; background: rgba(200,164,90,0.25); z-index: 15; }
  .razor2 { position: absolute; left: 0; right: 0; bottom: 660px; height: 1px; background: rgba(200,164,90,0.25); z-index: 15; }

  .top { position: absolute; top: 80px; left: 65px; right: 65px; z-index: 10; }
  .tagline { font-family: 'Work Sans'; font-weight: 400; font-style: italic; font-size: 26px; letter-spacing: 0.12em; text-transform: uppercase; color: #C8A45A; }

  .center { position: absolute; top: 48%; left: 65px; transform: translateY(-50%); z-index: 10; }
  .center-date { font-family: 'Big Shoulders Display'; font-weight: 900; font-size: 100px; line-height: 1; color: #C8A45A; }
  .center-venue { font-family: 'Work Sans'; font-weight: 700; font-size: 24px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(242,237,227,0.6); margin-top: 12px; }
  .center-city { font-family: 'Work Sans'; font-weight: 700; font-size: 24px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(200,164,90,0.6); margin-top: 6px; }

  .title-block { position: absolute; bottom: 120px; left: 65px; right: 65px; z-index: 10; }
  .t-curfew { font-family: 'Big Shoulders Display'; font-weight: 900; font-size: 210px; line-height: 0.88; text-transform: uppercase; color: #F2EDE3; text-shadow: 0 4px 80px rgba(200,164,90,0.35); }
  .t-festival { font-family: 'Big Shoulders Display'; font-weight: 900; font-size: 210px; line-height: 0.88; text-transform: uppercase; color: #C8A45A; }
  .t-year { font-family: 'Big Shoulders Display'; font-weight: 700; font-size: 130px; line-height: 1; color: transparent; -webkit-text-stroke: 2.5px rgba(200,164,90,0.5); letter-spacing: 0.08em; margin-top: 8px; }
</style>
</head>
<body>
  <div class="photo"></div><div class="wash"></div><div class="flare"></div>
  <div class="orb1"></div><div class="orb2"></div>
  <div class="razor1"></div><div class="razor2"></div>
  <div class="top"><div class="tagline">In House We Trust</div></div>
  <div class="center">
    <div class="center-date">SAT 06.06</div>
    <div class="center-venue">Blaarmeersen</div>
    <div class="center-city">Gent · Belgium</div>
  </div>
  <div class="title-block">
    <div class="t-curfew">CURFEW</div><div class="t-festival">FESTIVAL</div><div class="t-year">2026</div>
  </div>
  <div class="grain"></div>
</body>
</html>
