<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;900&family=Work+Sans:ital,wght@0,300;0,400;0,700;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 600px; overflow: hidden; background: #0A0A0C; position: relative; font-family: 'Work Sans', sans-serif; }

  .photo { position: absolute; inset: 0; background: url('./public/images/curfew-booth-red-lights.jpg') center 40% / cover; filter: saturate(1.2) brightness(0.7) contrast(1.15) sepia(0.2) hue-rotate(-10deg); }
  .wash { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(10,10,12,0.92) 0%, rgba(10,10,12,0.35) 25%, rgba(200,164,90,0.08) 50%, rgba(10,10,12,0.35) 75%, rgba(10,10,12,0.92) 100%); }
  .bottom-dark { position: absolute; inset: 0; background: linear-gradient(180deg, transparent 15%, rgba(10,10,12,0.7) 75%, rgba(10,10,12,0.97) 100%); }
  .flare { position: absolute; top: -120px; left: 50%; transform: translateX(-50%); width: 900px; height: 400px; border-radius: 50%; background: radial-gradient(ellipse, rgba(200,164,90,0.15) 0%, transparent 60%); filter: blur(50px); mix-blend-mode: screen; }
  .grain { position: absolute; inset: 0; opacity: 0.05; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); mix-blend-mode: overlay; z-index: 50; }

  .top-bar { position: absolute; top: 30px; left: 60px; right: 60px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
  .bar-tagline { font-family: 'Work Sans'; font-weight: 400; font-style: italic; font-size: 20px; letter-spacing: 0.12em; text-transform: uppercase; color: #C8A45A; }
  .bar-right { display: flex; align-items: center; gap: 40px; }
  .bar-venue { font-family: 'Work Sans'; font-weight: 700; font-size: 16px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(242,237,227,0.5); }
  .bar-date { font-family: 'Big Shoulders Display'; font-weight: 900; font-size: 48px; color: #C8A45A; }

  .title-block { position: absolute; bottom: 30px; left: 60px; z-index: 10; display: flex; align-items: baseline; gap: 30px; }
  .t-curfew { font-family: 'Big Shoulders Display'; font-weight: 900; font-size: 220px; line-height: 0.85; text-transform: uppercase; color: #F2EDE3; text-shadow: 0 4px 80px rgba(200,164,90,0.25); }
  .t-right { display: flex; flex-direction: column; padding-bottom: 15px; }
  .t-festival { font-family: 'Big Shoulders Display'; font-weight: 900; font-size: 110px; line-height: 0.88; text-transform: uppercase; color: #C8A45A; }
  .t-year { font-family: 'Big Shoulders Display'; font-weight: 700; font-size: 70px; line-height: 1; color: transparent; -webkit-text-stroke: 2px rgba(200,164,90,0.5); letter-spacing: 0.1em; }

  .right-info { position: absolute; bottom: 60px; right: 60px; text-align: right; z-index: 10; }
  .ri-venue { font-family: 'Work Sans'; font-weight: 700; font-size: 18px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(200,164,90,0.6); }
  .ri-sub { font-family: 'Work Sans'; font-weight: 400; font-size: 14px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(242,237,227,0.35); margin-top: 6px; }
</style>
</head>
<body>
  <div class="photo"></div><div class="wash"></div><div class="bottom-dark"></div><div class="flare"></div>
  <div class="top-bar">
    <span class="bar-tagline">In House We Trust</span>
    <div class="bar-right">
      <span class="bar-venue">Blaarmeersen · Gent</span>
      <span class="bar-date">SAT 06.06</span>
    </div>
  </div>
  <div class="title-block">
    <div class="t-curfew">CURFEW</div>
    <div class="t-right"><div class="t-festival">FESTIVAL</div><div class="t-year">2026</div></div>
  </div>
  <div class="right-info">
    <div class="ri-venue">Blaarmeersen · Gent · Belgium</div>
    <div class="ri-sub">Non-Profit House Music Festival</div>
  </div>
  <div class="grain"></div>
</body>
</html>
