<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Curfew Festival 2026 — IG Post</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;900&family=Work+Sans:ital,wght@0,300;0,400;0,700;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #0A0A0C;
    position: relative;
    font-family: 'Work Sans', sans-serif;
  }

  .photo-bg {
    position: absolute;
    inset: 0;
    background: url('./public/images/curfew-crowd-golden-hour.jpg') center center / cover no-repeat;
    filter: saturate(1.3) brightness(0.85) contrast(1.1) sepia(0.15);
  }

  .golden-wash {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(200, 164, 90, 0.5) 0%,
      rgba(180, 120, 40, 0.3) 25%,
      rgba(10, 10, 12, 0.5) 55%,
      rgba(10, 10, 12, 0.95) 100%
    );
    mix-blend-mode: multiply;
  }

  .warm-light {
    position: absolute;
    inset: 0;
    background: radial-gradient(
      ellipse at 50% 20%,
      rgba(255, 200, 80, 0.3) 0%,
      transparent 60%
    );
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    mix-blend-mode: screen;
    pointer-events: none;
  }

  .orb-gold {
    width: 420px;
    height: 420px;
    top: -80px;
    right: -60px;
    background: radial-gradient(circle, rgba(200, 164, 90, 0.45) 0%, transparent 70%);
  }

  .orb-amber {
    width: 300px;
    height: 300px;
    bottom: 280px;
    left: -80px;
    background: radial-gradient(circle, rgba(255, 179, 71, 0.3) 0%, transparent 70%);
  }

  .grain {
    position: absolute;
    inset: 0;
    opacity: 0.06;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    mix-blend-mode: overlay;
    pointer-events: none;
    z-index: 50;
  }

  /* ── TITLE BLOCK — bottom stack ── */
  .title-block {
    position: absolute;
    bottom: 55px;
    left: 55px;
    right: 55px;
    z-index: 10;
  }

  .title-curfew {
    font-family: 'Big Shoulders Display', sans-serif;
    font-weight: 900;
    font-size: 200px;
    line-height: 0.88;
    text-transform: uppercase;
    color: #F2EDE3;
    letter-spacing: 0.04em;
    text-shadow: 0 4px 60px rgba(200, 164, 90, 0.35);
  }

  .title-festival {
    font-family: 'Big Shoulders Display', sans-serif;
    font-weight: 900;
    font-size: 200px;
    line-height: 0.88;
    text-transform: uppercase;
    color: #C8A45A;
    letter-spacing: 0.04em;
  }

  .title-year {
    font-family: 'Big Shoulders Display', sans-serif;
    font-weight: 700;
    font-size: 120px;
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 2px rgba(200, 164, 90, 0.5);
    letter-spacing: 0.08em;
    margin-top: 5px;
  }

  /* ── RAZOR CUT ── */
  .razor-cut {
    position: absolute;
    left: 0;
    right: 0;
    top: 460px;
    height: 1px;
    background: rgba(200, 164, 90, 0.35);
    z-index: 15;
  }

  /* ── TOP INFO — big golden ── */
  .top-info {
    position: absolute;
    top: 45px;
    left: 55px;
    right: 55px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    z-index: 10;
  }

  .tagline {
    font-family: 'Work Sans', sans-serif;
    font-weight: 400;
    font-style: italic;
    font-size: 22px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #C8A45A;
  }

  .date-block {
    text-align: right;
  }

  .date-main {
    font-family: 'Big Shoulders Display', sans-serif;
    font-weight: 900;
    font-size: 68px;
    line-height: 1;
    color: #C8A45A;
    letter-spacing: 0.04em;
  }

  .date-sub {
    font-family: 'Work Sans', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(242, 237, 227, 0.6);
    margin-top: 6px;
  }

  /* ── BOTTOM INFO STRIP ── */
  .bottom-strip {
    position: absolute;
    bottom: 490px;
    left: 55px;
    right: 55px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 20;
  }

  .venue-info {
    font-family: 'Work Sans', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(200, 164, 90, 0.7);
  }

  .ticket-label {
    font-family: 'Big Shoulders Display', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #C8A45A;
    border: 1.5px solid rgba(200, 164, 90, 0.5);
    padding: 10px 28px;
  }

  .coord {
    position: absolute;
    font-family: 'Work Sans', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: rgba(200, 164, 90, 0.3);
    z-index: 10;
  }
  .coord-br { bottom: 480px; right: 55px; text-align: right; }
</style>
</head>
<body>
  <div class="photo-bg"></div>
  <div class="golden-wash"></div>
  <div class="warm-light"></div>
  <div class="orb orb-gold"></div>
  <div class="orb orb-amber"></div>
  <div class="razor-cut"></div>

  <div class="top-info">
    <span class="tagline">In House We Trust</span>
    <div class="date-block">
      <div class="date-main">06.06</div>
      <div class="date-sub">Blaarmeersen · Gent</div>
    </div>
  </div>

  <span class="coord coord-br">51.0543°N 3.6856°E</span>

  <div class="bottom-strip">
    <span class="venue-info">SAT 6 JUNE · GENT</span>
    <span class="ticket-label">Tickets →</span>
  </div>

  <div class="title-block">
    <div class="title-curfew">CURFEW</div>
    <div class="title-festival">FESTIVAL</div>
    <div class="title-year">2026</div>
  </div>

  <div class="grain"></div>
</body>
</html>
