<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;900&family=Work+Sans:ital,wght@0,300;0,400;0,700;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; background: #0A0A0C; position: relative; font-family: 'Work Sans', sans-serif; }

  .photo { position: absolute; inset: 0; background: url('./public/images/curfew-dj-discoballs-daytime.jpg') center 35% / cover; filter: saturate(1.35) brightness(0.85) contrast(1.1) sepia(0.18); }
  .wash { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(200,164,90,0.5) 0%, rgba(10,10,12,0.2) 35%, rgba(10,10,12,0.55) 60%, rgba(10,10,12,0.96) 100%); mix-blend-mode: multiply; }
  .warm { position: absolute; inset: 0; background: radial-gradient(ellipse at 60% 15%, rgba(255,200,80,0.35) 0%, transparent 55%); }
  .orb { position: absolute; width: 380px; height: 380px; bottom: 300px; right: -60px; border-radius: 50%; background: radial-gradient(circle, rgba(200,164,90,0.35) 0%, transparent 70%); filter: blur(60px); mix-blend-mode: screen; }
  .grain { position: absolute; inset: 0; opacity: 0.06; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); mix-blend-mode: overlay; z-index: 50; }

  .top-info { position: absolute; top: 45px; left: 55px; right: 55px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 10; }
  .date-main { font-family: 'Big Shoulders Display'; font-weight: 900; font-size: 72px; line-height: 1; color: #C8A45A; }
  .venue-top { font-family: 'Work Sans'; font-weight: 700; font-size: 20px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(200,164,90,0.7); margin-top: 15px; }

  .tagline-mid { position: absolute; top: 50%; left: 55px; transform: translateY(-50%); font-family: 'Work Sans'; font-weight: 400; font-style: italic; font-size: 28px; letter-spacing: 0.1em; text-transform: uppercase; color: #C8A45A; z-index: 10; }

  .title-block { position: absolute; bottom: 45px; left: 55px; right: 55px; z-index: 10; }
  .t-curfew { font-family: 'Big Shoulders Display'; font-weight: 900; font-size: 195px; line-height: 0.88; text-transform: uppercase; color: #F2EDE3; text-shadow: 0 4px 60px rgba(200,164,90,0.35); }
  .t-festival { font-family: 'Big Shoulders Display'; font-weight: 900; font-size: 195px; line-height: 0.88; text-transform: uppercase; color: #C8A45A; }
  .t-year { font-family: 'Big Shoulders Display'; font-weight: 700; font-size: 115px; line-height: 1; color: transparent; -webkit-text-stroke: 2px rgba(200,164,90,0.5); letter-spacing: 0.08em; margin-top: 5px; }

  .bottom-venue { position: absolute; bottom: 480px; left: 55px; font-family: 'Work Sans'; font-weight: 700; font-size: 20px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(242,237,227,0.55); z-index: 20; }
</style>
</head>
<body>
  <div class="photo"></div><div class="wash"></div><div class="warm"></div><div class="orb"></div>
  <div class="top-info">
    <div class="date-main">06.06</div>
    <div class="venue-top">Blaarmeersen<br>Gent · Belgium</div>
  </div>
  <div class="tagline-mid">In House We Trust</div>
  <span class="bottom-venue">SAT 6 JUNE 2026</span>
  <div class="title-block">
    <div class="t-curfew">CURFEW</div><div class="t-festival">FESTIVAL</div><div class="t-year">2026</div>
  </div>
  <div class="grain"></div>
</body>
</html>
