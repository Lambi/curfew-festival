<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@900&family=Space+Mono:wght@400&display=swap');

      .headline {
        font-family: 'Big Shoulders Display', sans-serif;
        font-weight: 900;
        font-size: 280px;
        letter-spacing: -8px;
        text-transform: uppercase;
        fill: #FAF2E1;
        line-height: 0.9;
      }

      .accent {
        fill: #3DED97;
      }

      .small-text {
        font-family: 'Space Mono', monospace;
        font-weight: 400;
        font-size: 16px;
        text-transform: uppercase;
        letter-spacing: 2px;
        fill: #FAF2E1;
      }

      .coordinate {
        font-family: 'Space Mono', monospace;
        font-weight: 400;
        font-size: 11px;
        fill: #FAF2E1;
        opacity: 0.15;
        letter-spacing: 1px;
      }
    </style>

    <filter id="bloom-soft">
      <feGaussianBlur in="SourceGraphic" stdDeviation="45" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#0F0E17" />

  <!-- Bloom circles -->
  <circle cx="120" cy="120" r="180" fill="#3DED97" opacity="0.1" filter="url(#bloom-soft)" />
  <circle cx="980" cy="940" r="200" fill="#FF6B9D" opacity="0.1" filter="url(#bloom-soft)" />

  <!-- Thin geometric bar -->
  <line x1="80" y1="200" x2="80" y2="900" stroke="#3DED97" stroke-width="3" opacity="0.08" />

  <!-- Content -->
  <text x="540" y="720" text-anchor="middle" class="accent" style="font-size: 92px; letter-spacing: -2px;">2026</text>

  <text x="540" y="950" text-anchor="middle" class="headline">CURFEW</text>

  <text x="540" y="1050" text-anchor="middle" class="small-text">SAT 6 JUNE · BLAARMEERSEN · GENT</text>

  <!-- Coordinate label -->
  <text x="1050" y="35" text-anchor="end" class="coordinate">51.3°N / 3.7°E</text>
</svg>
