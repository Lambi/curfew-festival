<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@100;900&family=Space+Mono:wght@400&display=swap');
    </style>
    <filter id="blur-60">
      <feGaussianBlur stdDeviation="60" />
    </filter>
    <filter id="blur-70">
      <feGaussianBlur stdDeviation="70" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#0A0A0C" />

  <!-- Thermal Orbs -->
  <!-- Rose orb (top-left, 500px diameter) -->
  <circle cx="180" cy="140" r="250" fill="#FF6B9D" opacity="0.18" filter="url(#blur-60)" />

  <!-- Signal green orb (bottom-right, 400px diameter) -->
  <circle cx="950" cy="950" r="200" fill="#3DED97" opacity="0.12" filter="url(#blur-70)" />

  <!-- Razor-thin vertical line (left 25%, 60% height) -->
  <line x1="270" y1="216" x2="270" y2="864" stroke="#F2EDE3" stroke-width="2" opacity="0.04" />

  <!-- Main Title: CUR / FEW (stacked, ~500px each) -->
  <text x="540" y="580" font-family="Big Shoulders Display" font-size="520" font-weight="900" fill="#F2EDE3" text-anchor="middle" letter-spacing="-31" dominant-baseline="middle">
    CUR
  </text>
  <text x="540" y="750" font-family="Big Shoulders Display" font-size="520" font-weight="900" fill="#F2EDE3" text-anchor="middle" letter-spacing="-31" dominant-baseline="middle">
    FEW
  </text>

  <!-- 2026 in thin weight, signal green -->
  <text x="540" y="880" font-family="Big Shoulders Display" font-size="72" font-weight="100" fill="#3DED97" text-anchor="middle" letter-spacing="8" dominant-baseline="middle">
    2026
  </text>

  <!-- Coordinate whisper (top-left) -->
  <text x="70" y="50" font-family="Space Mono" font-size="13" font-weight="400" fill="#F2EDE3" opacity="0.12">[-12.35, 19.68]</text>

  <!-- Event details (bottom, tiny, muted) -->
  <text x="540" y="1050" font-family="Space Mono" font-size="11" font-weight="400" fill="#F2EDE3" opacity="0.3" text-anchor="middle">
    SAT 6 JUNE · BLAARMEERSEN · GENT
  </text>
</svg>
